#changin prefix
set -g prefix C-x
unbind C-b

#index begin in 1 in windows
set -g base-index 1

#index begin in 1 in panes
setw -g pane-base-index 1

#reload conf
bind r source-file ~/.tmux.conf \; display "Conf Reloaded!"

#keep send prefix to app running inside tmux, pressinf prefix twice
bind C-x send-prefix

#enable mouse
set -g mouse on

#split windows
bind | split-window -h -c "#{pane_current_path}" #horizontal
bind - split-window -v -c "#{pane_current_path}" #vertical

#moving for panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#cycle through panes
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

#resizing panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#color
set -g default-terminal "screen-256color"

#-- statusbar --#
set -g status-interval 1
set -g renumber-windows on
set-window-option -g automatic-rename on
set-option -g set-titles on

setw -g mode-keys emacs
# this rule is good when I load predefined layout
#setw -g automatic-rename off

#-- colorscheme: Zenburn --#
# Palette aligned with zenburn.toml:
# background #3A3A3A, foreground #DCDCCC
# black      #1E2320, red        #D78787
# green      #60B48A, yellow     #DFAF8F
# blue       #506070, magenta    #DC8CC3
# cyan       #8CD0D3, bright blk #709080

# modes
setw -g clock-mode-colour "#C3BF9F"
set -g mode-style bg="#4F4F4F",fg="#DCDCCC"

# panes
set -g pane-border-style fg="#4F4F4F"
set -g pane-active-border-style fg="#7F9F7F"

# statusbar
set -g status-justify centre
set -g status-style bg="#3A3A3A",fg="#DCDCCC"
set -g status-left "#[bg=#4F4F4F,fg=#C3BF9F,bold] #S #[bg=#3A3A3A,fg=#8F8F8F,nobold]| #[fg=#DFAF8F]#I:#W #[fg=#8F8F8F]| #[fg=#DCDCCC]#{b:pane_current_path} "
set -g status-left-length 80
set -g status-right "#{?client_prefix,#[fg=#D78787]#[bold]PREFIX#[nobold] #[fg=#8F8F8F]| ,}#[fg=#709080]git #[fg=#C3BF9F]#(cd '#{pane_current_path}' 2>/dev/null && git branch --show-current 2>/dev/null) #[fg=#8F8F8F]| #[fg=#60B48A]%Y-%m-%d %H:%M"
set -g status-right-length 100

setw -g window-status-format "#[fg=#709080] #I #[fg=#8F8F8F]#W#{?window_activity_flag,*,}#{?window_bell_flag,!,} "
setw -g window-status-style bg="#3A3A3A",fg="#709080"
setw -g window-status-current-format "#[bg=#5F5F5F,fg=#F0DFAF,bold] #I #[fg=#F0DFAF]#W#{?window_zoomed_flag,[+],} "
setw -g window-status-current-style bg="#3A3A3A",fg="#F0DFAF"
setw -g window-status-bell-style bg="#3A3A3A",fg="#D78787"
setw -g window-status-activity-style bg="#3A3A3A",fg="#DFAF8F"
set -g status-position bottom

# messages
set -g message-style bg="#4F4F4F",fg="#DCDCCC"
set -g message-command-style bg="#4F4F4F",fg="#DFAF8F"


#paste
bind C-y paste-buffer
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

#maximizing panes
unbind Up
bind Up new-window -d -n tmp \; swap-pane -s tmp.0 \; select-window -t tmp
unbind Down
bind Down last-window \; swap-pane -s tmp.0 \; kill-window -t tmp


# tmux resurrect
#run-shell /home/luis/dev/tmux-resurrect-master/resurrect.tmux

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
